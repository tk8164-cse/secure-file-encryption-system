<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Secure File Vault - Access Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            display: block;
            padding-top: 100px;
        }
        .login-container {
            max-width: 420px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(30, 41, 59, 0.05);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 18pt;
            color: #0f172a;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .login-header p {
            font-size: 10pt;
            color: #64748b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 9pt;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #0f172a;
            font-size: 10pt;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
        }
        .error-msg {
            background-color: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            font-size: 9.5pt;
            margin-bottom: 20px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #0f172a;
            color: #ffffff;
            font-size: 10.5pt;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1e293b;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>Access Authorization</h1>
        <p>Cryptographic Storage Terminal Portal</p>
    </div>

    <div th:if="${param.error}" class="error-msg">
        Invalid credentials or unauthorized terminal token access request.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Agent Identifier</label>
            <input type="text" name="username" placeholder="Username" required autocomplete="off"/>
        </div>

        <div class="form-group">
            <label>Security Keyphrase</label>
            <input type="password" name="password" placeholder="Password" required/>
        </div>

        <button type="submit">Authenticate Terminal</button>
    </form>
</div>

</body>
</html>
